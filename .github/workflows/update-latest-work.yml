name: Update Latest Work Data

on:
    workflow_dispatch:
    push:
        branches:
            - main
    schedule:
        - cron: "0 * * * *"

permissions:
    contents: write

jobs:
    sync-latest-work:
        runs-on: ubuntu-latest
        env:
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            OWNER: KURE-x-Tech
            REPO_NAME: Spreading-Codes
            OUTPUT_PATH: data/latest-work.json
        steps:
            - name: Check out repository
              uses: actions/checkout@v4

            - name: Fetch repository snapshot
              run: |
                  repo_response=$(curl -fsSL \
                    -H "Accept: application/vnd.github+json" \
                    -H "Authorization: Bearer $GH_TOKEN" \
                    "https://api.github.com/repos/$OWNER/$REPO_NAME")

                  workflow_response=$(curl -fsSL \
                    -H "Accept: application/vnd.github+json" \
                    -H "Authorization: Bearer $GH_TOKEN" \
                    "https://api.github.com/repos/$OWNER/$REPO_NAME/actions/runs?per_page=5")

                  mkdir -p "$(dirname "$OUTPUT_PATH")"

                  jq -n \
                    --arg generated_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
                    --argjson repo "$repo_response" \
                    --argjson workflow "$workflow_response" \
                    '{
                      generatedAt: $generated_at,
                      repo: {
                        name: $repo.name,
                        htmlUrl: $repo.html_url,
                        description: $repo.description,
                        defaultBranch: $repo.default_branch,
                        updatedAt: $repo.updated_at,
                        activity: (($workflow.workflow_runs // []) | map({
                          name: .name,
                          status: .status,
                          conclusion: .conclusion,
                          branch: .head_branch,
                          htmlUrl: .html_url,
                          updatedAt: .updated_at
                        })),
                        workflow: ((($workflow.workflow_runs[0] // null) | if . == null then null else {
                          name: .name,
                          status: .status,
                          conclusion: .conclusion,
                          branch: .head_branch,
                          htmlUrl: .html_url,
                          updatedAt: .updated_at
                        } end))
                      }
                    }' > "$OUTPUT_PATH"

            - name: Commit refreshed data
              run: |
                  if git diff --quiet -- "$OUTPUT_PATH"; then
                    echo "No latest work changes to commit."
                    exit 0
                  fi

                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add "$OUTPUT_PATH"
                  git commit -m "chore: refresh latest work data"
                  git push
